version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocklock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocklock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocklock_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stocklock_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stocklock_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stocklock']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stocklock_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - stocklock_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: stocklock_elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - stocklock_net
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "status"']
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stocklock_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stocklock}:${POSTGRES_PASSWORD:-stocklock_secure_pass}@postgres:5432/${POSTGRES_DB:-stocklock_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      FRONTEND_URL: http://localhost
    ports:
      - '3000:3000'
    networks:
      - stocklock_net
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stocklock_frontend
    restart: unless-stopped
    networks:
      - stocklock_net

  nginx:
    image: nginx:alpine
    container_name: stocklock_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - stocklock_net

volumes:
  postgres_data:
  redis_data:
  elastic_data:
  uploads_data:

networks:
  stocklock_net:
    driver: bridge
